services:
  db:
    image: postgres:16-alpine
    container_name: snapit-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: snapit
      POSTGRES_PASSWORD: snapit
      POSTGRES_DB: snapit
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snapit -d snapit"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
