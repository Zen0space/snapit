services:
  db:
    image: postgres:16-alpine
    container_name: snapit-db-prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-snapit}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-snapit}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pg_data_prod:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${DB_USER:-snapit} -d ${DB_NAME:-snapit}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: snapit-backend:latest
    container_name: snapit-backend-prod
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: 9000
      NODE_ENV: production
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    ports:
      - "9000:9000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:9000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pg_data_prod:
